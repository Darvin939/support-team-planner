{% extends "base.html" %}

{% block title %}Статистика{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Статистика</h1>
</div>

<div class="team-selector">
    <label for="statsTeamSelect">Команда:</label>
    <select id="statsTeamSelect" onchange="loadStatistics()">
        <option value="0">Все команды</option>
        {% for team in teams %}
        <option value="{{ team.id }}">{{ team.name }}</option>
        {% endfor %}
    </select>
</div>

<div id="statisticsContent">
    <div class="stats-container">
        <div class="stats-card">
            <h3>Общая статистика</h3>
            <div class="stats-grid" id="summaryStats">
                <div class="stats-item">
                    <div class="stats-number" id="totalActive">0</div>
                    <div class="stats-label">Активных работ</div>
                </div>
            </div>
        </div>

        <div class="stats-card">
            <h3>Распределение по критичности</h3>
            <div class="stats-grid" id="criticalityStats">
                <div class="stats-item criticality-high">
                    <div class="stats-number" id="critHigh">0</div>
                    <div class="stats-label">Высокая</div>
                </div>
                <div class="stats-item criticality-medium">
                    <div class="stats-number" id="critMedium">0</div>
                    <div class="stats-label">Средняя</div>
                </div>
                <div class="stats-item criticality-low">
                    <div class="stats-number" id="critLow">0</div>
                    <div class="stats-label">Низкая</div>
                </div>
            </div>
        </div>

        <div class="stats-card">
            <h3>Статусы на сегодня</h3>
            <div class="stats-grid" id="statusStats">
                <div class="stats-item" style="background: #ffffff;">
                    <div class="stats-number" id="statusNew">0</div>
                    <div class="stats-label">Новый</div>
                </div>
                <div class="stats-item" style="background: #fff3cd;">
                    <div class="stats-number" id="statusPlanned">0</div>
                    <div class="stats-label">Запланировано</div>
                </div>
                <div class="stats-item" style="background: #f8d7da;">
                    <div class="stats-number" id="statusRollback">0</div>
                    <div class="stats-label">Откат</div>
                </div>
                <div class="stats-item" style="background: #d4edda;">
                    <div class="stats-number" id="statusSuccess">0</div>
                    <div class="stats-label">Успешно</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/statistics.js') }}"></script>
{% endblock %}
