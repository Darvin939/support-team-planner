{% extends "base.html" %}

{% block title %}Статистика{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Статистика</h1>
</div>

<div class="team-selector">
    <label for="statsTeamSelect">Команда:</label>
    <select id="statsTeamSelect" onchange="saveTeamId(this.value); loadAll()">
        <option value="0">Все команды</option>
        {% for team in teams %}
        <option value="{{ team.id }}">{{ team.name }}</option>
        {% endfor %}
    </select>
</div>

<!-- Активные работы на сегодня -->
<div class="stats-section">
    <h2>Активные работы на сегодня</h2>
    <div class="stats-counters" id="todayCounters"></div>
    <div class="stats-table-wrapper">
        <table class="stats-table">
            <thead>
            <tr>
                <th>Работа</th>
                <th>Крит.</th>
                <th>Блок</th>
                <th>Статус</th>
                <th>Исполнитель</th>
                <th>Комментарий</th>
            </tr>
            </thead>
            <tbody id="todayTableBody">
            </tbody>
        </table>
    </div>
</div>

<!-- Активные работы за период -->
<div class="stats-section">
    <h2>Активные работы за период</h2>
    <div class="filter-row" style="margin-bottom: 15px;">
        <div class="filter-group">
            <label for="statsDateFrom">От</label>
            <input type="date" id="statsDateFrom" class="filter-input" min="2000-01-01" max="2099-12-31">
        </div>
        <div class="filter-group">
            <label for="statsDateTo">до</label>
            <input type="date" id="statsDateTo" class="filter-input" min="2000-01-01" max="2099-12-31">
        </div>
    </div>
    <div class="stats-counters" id="periodCounters"></div>
    <div class="stats-table-wrapper">
        <table class="stats-table">
            <thead>
            <tr>
                <th>Работа</th>
                <th>Крит.</th>
                <th>Дата</th>
                <th>Блок</th>
                <th>Статус</th>
                <th>Исполнитель</th>
                <th>Комментарий</th>
            </tr>
            </thead>
            <tbody id="periodTableBody">
            </tbody>
        </table>
    </div>
</div>

<script src="/static/js/statistics.js"></script>
{% endblock %}
