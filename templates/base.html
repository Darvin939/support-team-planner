<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Планировщик работ{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="{{ url_for('index') }}" class="nav-brand">📋 Планировщик работ</a>
        <ul class="nav-menu">
            <li><a href="{{ url_for('index') }}">Главная</a></li>
            <li><a href="{{ url_for('statistics_page') }}">Статистика</a></li>
            <li><a href="{{ url_for('settings_page') }}">Настройки</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
